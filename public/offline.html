<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stayvo — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      width: 100%;
      max-width: 360px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 1.25rem;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 4px 24px rgba(15,23,42,0.06);
    }
    .icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: #E0A24D;
      color: #fff;
      font-size: 2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; }
    p  { margin-top: .5rem; font-size: .9rem; color: #64748b; line-height: 1.5; }
    button {
      margin-top: 1.5rem;
      padding: .6rem 1.4rem;
      background: #E0A24D;
      color: #fff;
      border: none;
      border-radius: .75rem;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">S</div>
    <h1>You're offline</h1>
    <p>Check your internet connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
